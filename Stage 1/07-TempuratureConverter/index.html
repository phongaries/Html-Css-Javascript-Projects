<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempurature Converter</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>    
</head>
<body>
    <div class="container">
            <h1>Tempurature Converter</h1>
        <div class="temp-container">
            <label>Celcius:</label>
            <input id="celcius-temp" type="number" placeholder="Enter Temporature">
        </div>

        <div class="temp-container">
            <label>Fahrenheit:</label>
            <input id="fahrenheit-temp" type="number" placeholder="Enter Temporature">

        </div>

        <div class="temp-container">
            <label>Kelvin:</label>
            <input id="kelvin-temp" type="number" placeholder="Enter Temporature">
        </div>
        
    </div>
    
    
</body>
</html>
